name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # Dummy values keep Prisma + @supabase/ssr + zod env parsing happy.
      # Real credentials are provided by staging/production environments.
      DATABASE_URL: postgresql://user:pass@localhost:5432/rose_cosmetics
      DIRECT_URL: postgresql://user:pass@localhost:5432/rose_cosmetics
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon-key

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        # Uses npm install because the lockfile is generated on first install.
        # Switch to `npm ci` once package-lock.json is committed.
        run: npm install --no-audit --no-fund

      - name: Prisma generate
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
